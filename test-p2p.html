'use strict';

var results = [];
var logLines = [];

function log(msg) {
  logLines.push('[' + new Date().toLocaleTimeString() + '] ' + msg);
}

function assert(condition, testName, detail) {
  results.push({ name: testName, pass: !!condition, detail: detail || '' });
  log((condition ? 'PASS' : 'FAIL') + ' - ' + testName + (detail ? ' (' + detail + ')' : ''));
}

function assertThrows(fn, testName, expectedMsg) {
  try {
    fn();
    results.push({ name: testName, pass: false, detail: 'Expected error but none thrown' });
    log('FAIL - ' + testName + ' (no error thrown)');
  } catch(e) {
    var match = !expectedMsg || e.message.indexOf(expectedMsg) >= 0;
    results.push({ name: testName, pass: match, detail: e.message });
    log((match ? 'PASS' : 'FAIL') + ' - ' + testName + ' (threw: ' + e.message + ')');
  }
}

function getBalances() {
  try { return JSON.parse(localStorage.getItem('cw_balances') || '{}'); } catch(e) { return {}; }
}

function setBalances(bals) {
  localStorage.setItem('cw_balances', JSON.stringify(bals));
}

function clearTestData() {
  localStorage.removeItem('cw_p2p_orders');
  localStorage.removeItem('cw_p2p_trades');
  localStorage.removeItem('cw_p2p_dw_history');
  localStorage.removeItem('cw_activity');
  // Ensure a mock user exists so placeOrderLocal / cancelOrderLocal don't throw "Not logged in"
  localStorage.setItem('cw_user', JSON.stringify({ name: 'Test User', addr: 'GTEST1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ567890' }));
  setBalances({ XLM: 10000, USDC: 2500, wETH: 1.85, wBTC: 0.042, EURC: 1200, OLIGHFT: 10000 });
  log('--- Test data cleared, balances reset, mock user set ---');
}

function testBackendExports() {

  assert(typeof P2P_BACKEND.PROOF_STATUS === 'object', 'PROOF_STATUS exported');
  assert(P2P_BACKEND.PROOF_STATUS.PENDING === 0, 'PROOF_STATUS.PENDING = 0');
  assert(P2P_BACKEND.PROOF_STATUS.CONFIRMED === 2, 'PROOF_STATUS.CONFIRMED = 2');
  assert(typeof P2P_BACKEND.submitProof === 'function', 'submitProof exported');
  assert(typeof P2P_BACKEND.confirmProof === 'function', 'confirmProof exported');
  assert(typeof P2P_BACKEND.disputeProof === 'function', 'disputeProof exported');

  assert(typeof P2P_BACKEND.depositToWallet === 'function', 'depositToWallet exported');
  assert(typeof P2P_BACKEND.withdrawToSIM === 'function', 'withdrawToSIM exported');
  assert(typeof P2P_BACKEND.getDepositHistory === 'function', 'getDepositHistory exported');
  assert(typeof P2P_BACKEND.getWithdrawHistory === 'function', 'getWithdrawHistory exported');
  assert(typeof P2P_BACKEND.getDWHistory === 'function', 'getDWHistory exported');
  assert(Array.isArray(P2P_BACKEND.MOBILE_PROVIDERS), 'MOBILE_PROVIDERS is array');
  assert(P2P_BACKEND.MOBILE_PROVIDERS.length >= 20, 'At least 20 mobile providers', P2P_BACKEND.MOBILE_PROVIDERS.length);

function testSeedOrderBook() {
  log('\n=== Suite: Order Book Seeding ===');

  P2P_BACKEND.seedOrderBook();
  var book = P2P_BACKEND.getOrderBookLocal();
  assert(book && book.buys && book.sells, 'Order book has buys and sells');
  assert(book.buys.length > 0, 'Has bid orders', book.buys.length + ' bids');
  assert(book.sells.length > 0, 'Has ask orders', book.sells.length + ' asks');

  // Check order structure
  var firstBid = book.buys[0];
  assert(firstBid.id, 'Bid has id');
  assert(firstBid.price > 0, 'Bid has price > 0', '$' + firstBid.price);
  assert(firstBid.amount > 0, 'Bid has amount > 0');
  assert(firstBid.side === 0, 'Bid side = 0 (BUY)');

  var firstAsk = book.sells[0];
  assert(firstAsk.side === 1, 'Ask side = 1 (SELL)');
  assert(firstAsk.price > 0, 'Ask has price > 0', '$' + firstAsk.price);
}

function testPlaceOrderLocal() {
  log('\n=== Suite: Place Order Local ===');

  var balsBefore = getBalances();
  var usdcBefore = balsBefore.USDC || 0;

  // Place a buy order
  var buyOrder = P2P_BACKEND.placeOrderLocal(0, 100, 0.50, 7, ['mpesa'], 'test');
  assert(buyOrder, 'Buy order created');
  assert(buyOrder.id, 'Buy order has ID', buyOrder.id);
  assert(buyOrder.side === 0, 'Buy order side = 0');
  assert(buyOrder.amount === 100, 'Buy order amount = 100');
  assert(buyOrder.price === 0.50, 'Buy order price = 0.50');

  var balsAfterBuy = getBalances();
  var usdcDeducted = usdcBefore - (balsAfterBuy.USDC || 0);
  assert(usdcDeducted >= 0, 'USDC was deducted for buy order', 'Deducted: ' + usdcDeducted.toFixed(2));

  // Place a sell order
  var olighftBefore = balsAfterBuy.OLIGHFT || 0;
  var sellOrder = P2P_BACKEND.placeOrderLocal(1, 50, 0.55, 7, ['mpesa'], 'test sell');
  assert(sellOrder, 'Sell order created');
  assert(sellOrder.side === 1, 'Sell order side = 1');

  var balsAfterSell = getBalances();
  var olighftDeducted = olighftBefore - (balsAfterSell.OLIGHFT || 0);
  assert(olighftDeducted >= 0, 'OLIGHFT deducted for sell order', 'Deducted: ' + olighftDeducted.toFixed(2));

  // My orders should have entries
  var myOrders = P2P_BACKEND.getMyOrdersLocal();
  assert(myOrders.length > 0, 'getMyOrdersLocal returns orders', myOrders.length + ' orders');
}

function testPlaceOrderValidation() {
  log('\n=== Suite: Place Order Validation ===');

  assertThrows(function() {
    P2P_BACKEND.placeOrderLocal(0, 0, 0.50, 7, ['mpesa'], 'test');
  }, 'Rejects zero amount', 'Amount must be');

  assertThrows(function() {
    P2P_BACKEND.placeOrderLocal(0, 100, 0, 7, ['mpesa'], 'test');
  }, 'Rejects zero price', 'Price must be');

  // Attempt to buy more than balance allows
  setBalances({ USDC: 1, OLIGHFT: 10000, XLM: 10000 });
  assertThrows(function() {
    P2P_BACKEND.placeOrderLocal(0, 1000, 0.50, 7, ['mpesa'], 'test');
  }, 'Rejects buy order exceeding USDC balance', 'Insufficient');

  // Restore
  setBalances({ XLM: 10000, USDC: 2500, wETH: 1.85, wBTC: 0.042, EURC: 1200, OLIGHFT: 10000 });
}

function testCancelOrder() {
  log('\n=== Suite: Cancel Order ===');

  var order = P2P_BACKEND.placeOrderLocal(1, 25, 0.60, 7, ['mpesa'], 'cancel test');
  assert(order, 'Order created for cancel test');

  var balBefore = getBalances().OLIGHFT || 0;
  P2P_BACKEND.cancelOrderLocal(order.id);

  var cancelled = P2P_BACKEND.getLocalOrder(order.id);
  assert(cancelled.status === 3, 'Order status = 3 (CANCELLED)', 'Status: ' + cancelled.status);

  var balAfter = getBalances().OLIGHFT || 0;
  assert(balAfter >= balBefore, 'OLIGHFT refunded after cancel', 'Before: ' + balBefore.toFixed(2) + ' After: ' + balAfter.toFixed(2));
}

function testDepositToWallet() {
  log('\n=== Suite: Deposit to Wallet ===');

  var balBefore = getBalances();
  var olighftBefore = balBefore.OLIGHFT || 0;

  // Deposit $100 of OLIGHFT via M-Pesa
  var result = P2P_BACKEND.depositToWallet('OLIGHFT', 100, 'mpesa', '+254712345678');
  assert(result, 'Deposit result returned');
  assert(result.type === 'deposit', 'Result type = deposit');
  assert(result.coin === 'OLIGHFT', 'Result coin = OLIGHFT');
  assert(result.usdAmount === 100, 'Result usdAmount = 100');
  assert(result.status === 'pending_proof', 'Result status = pending_proof (not complete)');
  assert(result.receiptCode, 'Receipt code generated');
  assert(result.receiptCode.indexOf('OLI-') === 0, 'Receipt code starts with OLI-', result.receiptCode);

  // Fee check: 1.5% of $100 = $1.50
  var expectedFee = 100 * 0.015;
  assert(Math.abs(result.fee - expectedFee) < 0.01, 'Fee = $1.50 (1.5%)', '$' + result.fee.toFixed(2));

  // Coins calculated but NOT yet credited
  var expectedCoins = (100 - expectedFee) / 0.50;
  assert(Math.abs(result.coinsReceived - expectedCoins) < 0.01, 'Coins received = 197', result.coinsReceived.toFixed(4));

  // Wallet balance NOT increased yet (pending proof)
  var balAfterInit = getBalances();
  assert(balAfterInit.OLIGHFT === olighftBefore, 'OLIGHFT balance unchanged until proof verified', olighftBefore.toFixed(2));

  // Submit proof with CORRECT receipt code → auto-verify
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,test123', result.receiptCode, 'Test deposit proof');
  P2P_BACKEND.verifyDWTransaction(result.id);

  // Now balance should increase
  var balAfterVerify = getBalances();
  var olighftAfter = balAfterVerify.OLIGHFT || 0;
  assert(olighftAfter > olighftBefore, 'OLIGHFT balance increased after verify', olighftBefore.toFixed(2) + ' -> ' + olighftAfter.toFixed(2));
  assert(Math.abs((olighftAfter - olighftBefore) - expectedCoins) < 0.01, 'Balance change matches coins received');

  // Record should be confirmed
  var verified = P2P_BACKEND.getDWRecord(result.id);
  assert(verified.status === 'confirmed', 'Status = confirmed after verify');
  assert(verified.proofVerifiedAt > 0, 'proofVerifiedAt timestamp set');

  // History recorded
  var history = P2P_BACKEND.getDepositHistory();
  assert(history.length > 0, 'Deposit history has entries', history.length);
  assert(history[0].id === result.id, 'Latest history matches deposit');
  assert(history[0].provider === 'mpesa', 'History records provider');
  assert(history[0].phone === '+254712345678', 'History records phone');

  // Activity logged
  var acts = [];
  try { acts = JSON.parse(localStorage.getItem('cw_activity') || '[]'); } catch(e) {}
  var depAct = acts.find(function(a) { return a.type === 'p2p_deposit'; });
  assert(depAct, 'Deposit logged to activity feed');
}

function testDepositValidation() {
  log('\n=== Suite: Deposit Validation ===');

  assertThrows(function() {
    P2P_BACKEND.depositToWallet('', 100, 'mpesa', '+254712345678');
  }, 'Rejects empty coin', 'required');

  assertThrows(function() {
    P2P_BACKEND.depositToWallet('OLIGHFT', 0.5, 'mpesa', '+254712345678');
  }, 'Rejects amount < $1', 'Minimum');

  assertThrows(function() {
    P2P_BACKEND.depositToWallet('OLIGHFT', 20000, 'mpesa', '+254712345678');
  }, 'Rejects amount > $10,000', 'Maximum');

  assertThrows(function() {
    P2P_BACKEND.depositToWallet('OLIGHFT', 100, 'mpesa', '');
  }, 'Rejects empty phone', 'required');

  assertThrows(function() {
    P2P_BACKEND.depositToWallet('OLIGHFT', 100, 'mpesa', '-------');
  }, 'Rejects phone with no digits', 'Invalid phone');

  assertThrows(function() {
    P2P_BACKEND.depositToWallet('OLIGHFT', 100, '', '+254712345678');
  }, 'Rejects empty provider', 'required');
}

function testDepositMultiCoin() {
  log('\n=== Suite: Deposit Multi-Coin ===');

  // Deposit USDC (must verify proof for balance change)
  var balBefore = getBalances();
  var result = P2P_BACKEND.depositToWallet('USDC', 50, 'airtel', '+254700000001');
  var fee = 50 * 0.015;
  var expected = (50 - fee) / 1.00; // USDC is $1
  assert(Math.abs(result.coinsReceived - expected) < 0.01, 'USDC deposit: correct coins', result.coinsReceived.toFixed(2) + ' USDC');
  assert(result.status === 'pending_proof', 'USDC deposit: pending_proof');
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,usdc', result.receiptCode, '');
  P2P_BACKEND.verifyDWTransaction(result.id);
  var balAfter = getBalances();
  assert(balAfter.USDC > balBefore.USDC, 'USDC balance increased after verify');

  // Deposit XLM
  balBefore = getBalances();
  result = P2P_BACKEND.depositToWallet('XLM', 25, 'mtn', '+254700000002');
  fee = 25 * 0.015;
  expected = (25 - fee) / 0.12; // XLM is $0.12
  assert(Math.abs(result.coinsReceived - expected) < 0.5, 'XLM deposit: correct coins', result.coinsReceived.toFixed(2) + ' XLM');
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,xlm', result.receiptCode, '');
  P2P_BACKEND.verifyDWTransaction(result.id);
  balAfter = getBalances();
  assert(balAfter.XLM > balBefore.XLM, 'XLM balance increased after verify');
}

function testWithdrawToSIM() {
  log('\n=== Suite: Withdraw to SIM ===');

  // Ensure enough balance
  setBalances({ OLIGHFT: 5000, USDC: 2500, XLM: 10000 });

  var balBefore = getBalances();
  var olighftBefore = balBefore.OLIGHFT;

  // Withdraw 200 OLIGHFT
  var result = P2P_BACKEND.withdrawToSIM('OLIGHFT', 200, 'mpesa', '+254712345678');
  assert(result, 'Withdraw result returned');
  assert(result.type === 'withdraw', 'Result type = withdraw');
  assert(result.coin === 'OLIGHFT', 'Result coin = OLIGHFT');
  assert(result.coinAmount === 200, 'Result coinAmount = 200');
  assert(result.status === 'pending_proof', 'Result status = pending_proof');
  assert(result.receiptCode && result.receiptCode.indexOf('OLI-') === 0, 'Receipt code generated', result.receiptCode);

  // USD value: 200 * $0.50 = $100
  assert(Math.abs(result.usdValue - 100) < 0.01, 'USD value = $100', '$' + result.usdValue.toFixed(2));

  // Fee: $100 * 2% = $2
  assert(Math.abs(result.fee - 2) < 0.01, 'Fee = $2 (2%)', '$' + result.fee.toFixed(2));

  // Net USD: $100 - $2 = $98
  assert(Math.abs(result.netUsd - 98) < 0.01, 'Net USD = $98', '$' + result.netUsd.toFixed(2));

  // Balance decreased immediately (escrow for withdrawals)
  var balAfter = getBalances();
  assert(balAfter.OLIGHFT === olighftBefore - 200, 'Balance decreased by 200 (escrow)', olighftBefore + ' -> ' + balAfter.OLIGHFT);

  // Submit proof and verify
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,wdproof', result.receiptCode, 'Withdrawal proof');
  P2P_BACKEND.verifyDWTransaction(result.id);
  var verified = P2P_BACKEND.getDWRecord(result.id);
  assert(verified.status === 'confirmed', 'Status = confirmed after proof verification');

  // History recorded
  var history = P2P_BACKEND.getWithdrawHistory();
  assert(history.length > 0, 'Withdraw history has entries');
  assert(history[0].id === result.id, 'Latest history matches withdrawal');
  assert(history[0].phone === '+254712345678', 'History records phone');
  assert(history[0].netUsd === 98, 'History records net USD');

  // Activity logged
  var acts = [];
  try { acts = JSON.parse(localStorage.getItem('cw_activity') || '[]'); } catch(e) {}
  var wdAct = acts.find(function(a) { return a.type === 'p2p_withdraw'; });
  assert(wdAct, 'Withdrawal logged to activity feed');
}

function testWithdrawMultiCoin() {
  log('\n=== Suite: Withdraw Multi-Coin ===');

  setBalances({ OLIGHFT: 5000, USDC: 2500, XLM: 10000 });

  // Withdraw USDC (wallet debited immediately as escrow)
  var result = P2P_BACKEND.withdrawToSIM('USDC', 100, 'airtel', '+254700000001');
  assert(result.status === 'pending_proof', 'USDC withdraw: pending_proof');
  assert(Math.abs(result.usdValue - 100) < 0.01, 'USDC withdraw: USD value = $100');
  assert(Math.abs(result.fee - 2) < 0.01, 'USDC withdraw: fee = $2');
  assert(getBalances().USDC === 2400, 'USDC balance = 2400 after withdrawal (escrowed)');
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,usdc_wd', result.receiptCode, '');
  P2P_BACKEND.verifyDWTransaction(result.id);
  assert(P2P_BACKEND.getDWRecord(result.id).status === 'confirmed', 'USDC withdraw confirmed');

  // Withdraw XLM
  result = P2P_BACKEND.withdrawToSIM('XLM', 500, 'mtn', '+254700000002');

function testProofDispute() {
  log('\n=== Suite: Proof Dispute ===');

  setBalances({ XLM: 10000, USDC: 5000, OLIGHFT: 10000 });
  P2P_BACKEND.seedOrderBook();
  P2P_BACKEND.placeOrderLocal(0, 30, 0.55, 7, ['mpesa'], 'dispute test');
  var trades = P2P_BACKEND.getMyTradesLocal();
  if (trades.length === 0) {
    results.push({ name: 'Dispute test skipped', pass: true, detail: 'SKIP' });
    return;
  }

  // Find an unconfirmed trade
  var trade = null;
  for (var i = 0; i < trades.length; i++) {
    if (trades[i].proofStatus === 0 || trades[i].proofStatus === 1) {
      trade = trades[i];
      break;
    }
  }
  if (!trade) {
    results.push({ name: 'Dispute test skipped (no eligible trade)', pass: true, detail: 'SKIP' });
    return;
  }

  P2P_BACKEND.submitProof(trade.id, 'data:image/png;base64,fake', 'FAKE-TX', 'Fake proof');
  P2P_BACKEND.disputeProof(trade.id, 'Payment not received');
  var updated = P2P_BACKEND.getLocalTrade(trade.id);
  assert(updated.proofStatus === 3, 'After disputeProof: status = DISPUTED (3)');

  // Can resubmit after dispute
  P2P_BACKEND.submitProof(trade.id, 'data:image/png;base64,real', 'REAL-TX', 'Real proof this time');
  updated = P2P_BACKEND.getLocalTrade(trade.id);
  assert(updated.proofStatus === 1, 'After resubmit: status = SUBMITTED (1)');
  assert(updated.proofTxCode === 'REAL-TX', 'Updated TX code after resubmit');
}

function testBankDeposit() {
  log('\n=== Suite: Bank Deposit ===');

  setBalances({ OLIGHFT: 10000, USDC: 2500, XLM: 10000 });
  var balBefore = getBalances();
  var olighftBefore = balBefore.OLIGHFT;

  // Deposit $500 OLIGHFT via KCB
  var result = P2P_BACKEND.depositViaBank('OLIGHFT', 500, 'kcb', '1234567890', 'John Doe');
  assert(result, 'Bank deposit result returned');
  assert(result.type === 'bank_deposit', 'Result type = bank_deposit');
  assert(result.coin === 'OLIGHFT', 'Result coin = OLIGHFT');
  assert(result.usdAmount === 500, 'Result usdAmount = 500');
  assert(result.status === 'pending_proof', 'Result status = pending_proof');
  assert(result.receiptCode && result.receiptCode.indexOf('OLI-') === 0, 'Receipt code generated', result.receiptCode);

  // Fee: 1% of $500 = $5
  var expectedFee = 500 * 0.01;
  assert(Math.abs(result.fee - expectedFee) < 0.01, 'Fee = $5 (1%)', '$' + result.fee.toFixed(2));

  // Coins: ($500 - $5) / $0.50 = 990 OLIGHFT
  var expectedCoins = (500 - expectedFee) / 0.50;
  assert(Math.abs(result.coinsReceived - expectedCoins) < 0.01, 'Coins received = 990', result.coinsReceived.toFixed(4));

  // Balance NOT increased yet (pending proof)
  var balMid = getBalances();
  assert(balMid.OLIGHFT === olighftBefore, 'OLIGHFT balance unchanged before proof');

  // Submit proof and verify
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,bankdep', result.receiptCode, 'Bank deposit proof');
  P2P_BACKEND.verifyDWTransaction(result.id);

  // Now balance increased
  var balAfter = getBalances();
  assert(balAfter.OLIGHFT > olighftBefore, 'OLIGHFT balance increased after proof', olighftBefore.toFixed(2) + ' -> ' + balAfter.OLIGHFT.toFixed(2));
  assert(Math.abs((balAfter.OLIGHFT - olighftBefore) - expectedCoins) < 0.01, 'Balance change matches coins received');
  assert(P2P_BACKEND.getDWRecord(result.id).status === 'confirmed', 'Status = confirmed after verification');

  // History recorded
  var history = P2P_BACKEND.getBankDepositHistory();
  assert(history.length > 0, 'Bank deposit history has entries', history.length);
  assert(history[0].type === 'bank_deposit', 'History type = bank_deposit');
  assert(history[0].bankId === 'kcb', 'History records bankId');
  assert(history[0].accountNumber === '1234567890', 'History records account number');
  assert(history[0].accountName === 'John Doe', 'History records account name');

  // Multi-coin: USDC via Equity
  var usdcBefore = getBalances().USDC;
  result = P2P_BACKEND.depositViaBank('USDC', 200, 'equity', '9876543210', 'Jane Doe');
  assert(result.status === 'pending_proof', 'USDC bank deposit: pending_proof');
  var fee = 200 * 0.01;
  var expected = (200 - fee) / 1.00;
  assert(Math.abs(result.coinsReceived - expected) < 0.01, 'USDC bank deposit: correct coins', result.coinsReceived.toFixed(2));
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,usdc_bank', result.receiptCode, '');
  P2P_BACKEND.verifyDWTransaction(result.id);
  assert(getBalances().USDC > usdcBefore, 'USDC balance increased after bank deposit proof');

  // XLM via wire
  var xlmBefore = getBalances().XLM;
  result = P2P_BACKEND.depositViaBank('XLM', 100, 'wire', 'WIRE-ACCT-001', 'Wire User');
  assert(result.status === 'pending_proof', 'XLM bank deposit: pending_proof');
  fee = 100 * 0.01;
  expected = (100 - fee) / 0.12;
  assert(Math.abs(result.coinsReceived - expected) < 1, 'XLM bank deposit: correct coins', result.coinsReceived.toFixed(2));
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,xlm_bank', result.receiptCode, '');

function testDWProofMismatch() {
  log('\n=== Suite: DW Proof Mismatch ===');

  localStorage.removeItem('cw_p2p_dw_history');
  setBalances({ OLIGHFT: 10000, USDC: 5000 });

  // Deposit with wrong receipt code → should auto-reject
  var dep = P2P_BACKEND.depositToWallet('OLIGHFT', 50, 'mpesa', '+254712345678');
  assert(dep.status === 'pending_proof', 'Deposit starts pending_proof');
  assert(dep.receiptCode, 'Receipt code exists');

  // Submit proof with WRONG code
  P2P_BACKEND.submitDWProof(dep.id, 'data:image/png;base64,wrong', 'WRONG-CODE-123', 'Wrong code');
  try { P2P_BACKEND.verifyDWTransaction(dep.id); } catch(e) { /* expected mismatch throw */ }

  var record = P2P_BACKEND.getDWRecord(dep.id);
  assert(record.status === 'rejected', 'Mismatched code → rejected', record.status);

  // Wallet NOT credited (deposit rejection)
  var bal = getBalances().OLIGHFT;
  assert(bal === 10000, 'Wallet not credited on deposit rejection', bal);

  // Bank withdraw with wrong code → should auto-reject AND refund
  var wd = P2P_BACKEND.withdrawToBank('USDC', 100, 'kcb', '1234567890', 'Test User');
  assert(wd.status === 'pending_proof', 'Withdraw starts pending_proof');
  var usdcAfterEscrow = getBalances().USDC;
  assert(usdcAfterEscrow === 4900, 'USDC debited as escrow', usdcAfterEscrow);

  // Submit proof with WRONG code
  P2P_BACKEND.submitDWProof(wd.id, 'data:image/png;base64,wrongwd', 'BAD-CODE-999', '');
  try { P2P_BACKEND.verifyDWTransaction(wd.id); } catch(e) { /* expected mismatch throw */ }

  var wdRecord = P2P_BACKEND.getDWRecord(wd.id);
  assert(wdRecord.status === 'rejected', 'Withdraw with wrong code → rejected', wdRecord.status);

  // Wallet REFUNDED on withdrawal rejection
  var usdcAfterReject = getBalances().USDC;
  assert(usdcAfterReject === 5000, 'USDC refunded after withdrawal rejection', usdcAfterReject);
}

function testDWProofRejection() {
  log('\n=== Suite: DW Proof Rejection & Refund ===');

  localStorage.removeItem('cw_p2p_dw_history');
  setBalances({ OLIGHFT: 5000, XLM: 10000 });

  // Manual rejection of a withdrawal → should refund
  var wd = P2P_BACKEND.withdrawToSIM('OLIGHFT', 200, 'mpesa', '+254712345678');
  assert(getBalances().OLIGHFT === 4800, 'OLIGHFT escrowed (4800)');

  // Submit valid proof
  P2P_BACKEND.submitDWProof(wd.id, 'data:image/png;base64,wdrej', wd.receiptCode, '');

  // Manually reject (admin override)
  P2P_BACKEND.rejectDWProof(wd.id, 'Admin: payment not found');
  var record = P2P_BACKEND.getDWRecord(wd.id);
  assert(record.status === 'rejected', 'Manual rejection works');
  assert(record.rejectReason === 'Admin: payment not found', 'Reject reason saved');

  // Wallet refunded
  assert(getBalances().OLIGHFT === 5000, 'OLIGHFT refunded after manual rejection');

  // Deposit rejection does NOT refund (nothing was credited)
  var dep = P2P_BACKEND.depositToWallet('XLM', 25, 'mtn', '+254700000001');
  var xlmBefore = getBalances().XLM;
  P2P_BACKEND.submitDWProof(dep.id, 'data:image/png;base64,deprej', dep.receiptCode, '');
  P2P_BACKEND.rejectDWProof(dep.id, 'Fake screenshot');
  assert(getBalances().XLM === xlmBefore, 'XLM unchanged on deposit rejection (nothing to refund)');
  assert(P2P_BACKEND.getDWRecord(dep.id).status === 'rejected', 'Deposit rejected');
}

  try { P2P_BACKEND.verifyDWTransaction(d2.id); } catch(e) { /* expected mismatch throw */ }

function testCardDeposit() {
  log('\n=== Suite: Card Deposit ===');

  setBalances({ OLIGHFT: 10000, USDC: 2500, XLM: 10000 });
  var olighftBefore = getBalances().OLIGHFT;

  // Deposit $200 OLIGHFT via Visa
  var result = P2P_BACKEND.depositViaCard('OLIGHFT', 200, 'visa', '4321', 'JOHN DOE');
  assert(result, 'Card deposit result returned');
  assert(result.type === 'card_deposit', 'Result type = card_deposit');
  assert(result.coin === 'OLIGHFT', 'Result coin = OLIGHFT');
  assert(result.usdAmount === 200, 'Result usdAmount = 200');
  assert(result.status === 'pending_proof', 'Result status = pending_proof');
  assert(result.receiptCode && result.receiptCode.indexOf('OLI-') === 0, 'Receipt code generated', result.receiptCode);
  assert(result.cardType === 'visa', 'Card type = visa');
  assert(result.cardLast4 === '4321', 'Card last4 = 4321');

  // Fee: 2.5% of $200 = $5
  var expectedFee = 200 * 0.025;
  assert(Math.abs(result.fee - expectedFee) < 0.01, 'Fee = $5 (2.5%)', '$' + result.fee.toFixed(2));

  // Coins: ($200 - $5) / $0.50 = 390 OLIGHFT
  var expectedCoins = (200 - expectedFee) / 0.50;
  assert(Math.abs(result.coinsReceived - expectedCoins) < 0.01, 'Coins received = 390', result.coinsReceived.toFixed(4));

  // Balance NOT increased yet
  assert(getBalances().OLIGHFT === olighftBefore, 'Balance unchanged before proof');

  // Submit proof and verify
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,cardprf', result.receiptCode, '');
  P2P_BACKEND.verifyDWTransaction(result.id);
  assert(getBalances().OLIGHFT > olighftBefore, 'Balance increased after card deposit proof', getBalances().OLIGHFT);
  assert(P2P_BACKEND.getDWRecord(result.id).status === 'confirmed', 'Status confirmed');

  // History
  var history = P2P_BACKEND.getCardDepositHistory();
  assert(history.length > 0, 'Card deposit history has entries');
  assert(history[0].type === 'card_deposit', 'History type = card_deposit');
  assert(history[0].cardType === 'visa', 'History records cardType');

  // Multi-coin: USDC via Mastercard
  var usdcBefore = getBalances().USDC;
  result = P2P_BACKEND.depositViaCard('USDC', 100, 'mastercard', '5678', 'JANE DOE');
  assert(result.status === 'pending_proof', 'USDC card deposit: pending_proof');
  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,mc', result.receiptCode, '');
  P2P_BACKEND.verifyDWTransaction(result.id);
  assert(getBalances().USDC > usdcBefore, 'USDC increased after card deposit');
}

function testCardWithdraw() {
  log('\n=== Suite: Card Withdraw ===');

  setBalances({ OLIGHFT: 5000, USDC: 2500, XLM: 10000 });
  var olighftBefore = getBalances().OLIGHFT;

  // Withdraw 300 OLIGHFT via Visa
  var result = P2P_BACKEND.withdrawToCard('OLIGHFT', 300, 'visa', '9876', 'JOHN DOE');
  assert(result, 'Card withdraw result returned');
  assert(result.type === 'card_withdraw', 'Result type = card_withdraw');

  assert(result.coinAmount === 300, 'Result coinAmount = 300');

  assert(result.cardType === 'visa', 'Card type = visa');

  // Net: $150 - $4.50 = $145.50

  // Balance decreased (escrow)

  P2P_BACKEND.submitDWProof(result.id, 'data:image/png;base64,cwdprf', result.receiptCode, '');

  // History
  var history = P2P_BACKEND.getCardWithdrawHistory();
  assert(history.length > 0, 'Card withdraw history has entries');
  assert(history[0].type === 'card_withdraw', 'History type = card_withdraw');
  assert(history[0].cardType === 'visa', 'History records cardType');
  assert(history[0].cardLast4 === '9876', 'History records last4');

  // Multi-coin: USDC via Amex

function renderResults() {
  var el = document.getElementById('results');
  var suites = {};
  var currentSuite = 'General';

  for (var i = 0; i < logLines.length; i++) {
    var m = logLines[i].match(/=== Suite: (.+) ===/);
    if (m) currentSuite = m[1];
  }

  // Group results by suite
  var suiteOrder = [];
  var suiteResults = {};
  var cs = '';
  for (var j = 0; j < results.length; j++) {
    // Try to assign suite based on position
    var suiteName = getSuiteForIndex(j);
    if (!suiteResults[suiteName]) {
      suiteResults[suiteName] = [];
      suiteOrder.push(suiteName);
    }
    suiteResults[suiteName].push(results[j]);
  }

  var html = '';
  for (var s = 0; s < suiteOrder.length; s++) {
    var name = suiteOrder[s];
    var items = suiteResults[name];
    var passCount = items.filter(function(r) { return r.pass; }).length;
    var failCount = items.length - passCount;
    var icon = failCount > 0 ? '\u274C' : '\u2705';
    html += '<h2>' + icon + ' ' + name + ' (' + passCount + '/' + items.length + ')</h2><div class="suite">';
    for (var t = 0; t < items.length; t++) {
      var r = items[t];
      var cls = r.pass ? 'pass' : 'fail';
      html += '<div class="test"><span class="badge ' + cls + '">' + (r.pass ? 'PASS' : 'FAIL') + '</span>';
      html += '<span class="' + cls + '">' + r.name + '</span>';
      if (r.detail) html += '<span class="detail">' + r.detail + '</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  el.innerHTML = html;

  // Summary
  var totalPass = results.filter(function(r) { return r.pass; }).length;
  var totalFail = results.length - totalPass;
  var sumEl = document.getElementById('summary');
  if (totalFail === 0) {
    sumEl.className = 'summary all-pass';
    sumEl.innerHTML = '\u2705 ALL ' + results.length + ' TESTS PASSED';
  } else {
    sumEl.className = 'summary has-fail';
    sumEl.innerHTML = '\u274C ' + totalFail + ' FAILED / ' + results.length + ' TOTAL';
  }

  // Log
  document.getElementById('log').textContent = logLines.join('\n');
}

var suiteNames = [];
function getSuiteForIndex(idx) {
  if (suiteNames.length === 0) return 'General';
  var count = 0;
  for (var i = 0; i < suiteNames.length; i++) {
    count += suiteNames[i].count;
    if (idx < count) return suiteNames[i].name;
  }
  return suiteNames[suiteNames.length - 1].name;
}

function runAllTests() {
  results = [];
  logLines = [];
  suiteNames = [];

  var suites = [
    { name: 'Backend Exports', fn: testBackendExports },
    { name: 'DW Proof Exports', fn: testDWProofExports },
    { name: 'Order Book Seeding', fn: testSeedOrderBook },
    { name: 'Place Order', fn: testPlaceOrderLocal },
    { name: 'Place Order Validation', fn: testPlaceOrderValidation },
    { name: 'Cancel Order', fn: testCancelOrder },
    { name: 'Deposit to Wallet', fn: testDepositToWallet },
    { name: 'Deposit Validation', fn: testDepositValidation },
    { name: 'Deposit Multi-Coin', fn: testDepositMultiCoin },
    { name: 'Withdraw to SIM', fn: testWithdrawToSIM },
    { name: 'Withdraw Validation', fn: testWithdrawValidation },
    { name: 'Withdraw Multi-Coin', fn: testWithdrawMultiCoin },
    { name: 'Wallet Integration', fn: testWalletIntegration },
    { name: 'Proof System', fn: testProofSystem },
    { name: 'Proof Dispute', fn: testProofDispute },
    { name: 'DW Proof Mismatch', fn: testDWProofMismatch },
    { name: 'DW Proof Rejection & Refund', fn: testDWProofRejection },
    { name: 'Pending DW Transactions', fn: testGetPendingDWTransactions },
    { name: 'Edge Cases', fn: testEdgeCases },
    { name: 'Payment Methods', fn: testPaymentMethods },
    { name: 'History Persistence', fn: testHistoryPersistence },
    { name: 'Bank Deposit', fn: testBankDeposit },
    { name: 'Bank Deposit Validation', fn: testBankDepositValidation },
    { name: 'Bank Withdraw', fn: testBankWithdraw },
    { name: 'Bank Withdraw Validation', fn: testBankWithdrawValidation },
    { name: 'Bank History Persistence', fn: testBankHistoryPersistence },
    { name: 'Card Deposit', fn: testCardDeposit },
    { name: 'Card Deposit Validation', fn: testCardDepositValidation },
    { name: 'Card Withdraw', fn: testCardWithdraw },
    { name: 'Card Withdraw Validation', fn: testCardWithdrawValidation },
    { name: 'Card History Persistence', fn: testCardHistoryPersistence },
  ];

  for (var i = 0; i < suites.length; i++) {
    var before = results.length;
    try {
      clearTestData();
      suites[i].fn();
    } catch(e) {
      results.push({ name: suites[i].name + ' CRASHED', pass: false, detail: e.message });
      log('CRASH - ' + suites[i].name + ': ' + e.message);
    }
    suiteNames.push({ name: suites[i].name, count: results.length - before });
  }

  // Final cleanup
  setBalances({ XLM: 10000, USDC: 2500, wETH: 1.85, wBTC: 0.042, EURC: 1200, OLIGHFT: 10000 });
  renderResults();
}

function resetAndRun() {
  clearTestData();
  localStorage.removeItem('cw_p2p_orders');
  localStorage.removeItem('cw_p2p_trades');
  localStorage.removeItem('cw_p2p_dw_history');
  localStorage.removeItem('cw_activity');
  runAllTests();
}
