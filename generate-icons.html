<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Generate PWA Icons</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">
<h2>PWA Icon Generator</h2>
<p>Right-click each image below and "Save image as" to the <code>icons/</code> folder, <br>OR click "Download All" to get them automatically.</p>
<div id="icons" style="display:flex;flex-wrap:wrap;gap:16px;margin:20px 0"></div>
<button onclick="downloadAll()" style="padding:12px 24px;background:#6c5ce7;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer">Download All</button>
<script>
var sizes = [72, 96, 128, 144, 152, 192, 384, 512];

function drawIcon(size) {
  var c = document.createElement('canvas');
  c.width = size; c.height = size;
  var ctx = c.getContext('2d');
  // Background
  var g = ctx.createLinearGradient(0, 0, size, size);
  g.addColorStop(0, '#0a0a1a');
  g.addColorStop(0.5, '#111128');
  g.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = g;
  // Rounded rect
  var r = size * 0.15;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size - r, 0); ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r); ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath(); ctx.fill();
  // Border glow
  var bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, '#6c5ce7'); bg.addColorStop(1, '#a29bfe');
  ctx.strokeStyle = bg; ctx.lineWidth = size * 0.02; ctx.stroke();
  // Center circle
  ctx.beginPath();
  ctx.arc(size/2, size*0.42, size*0.2, 0, Math.PI*2);
  var cg = ctx.createRadialGradient(size/2, size*0.42, 0, size/2, size*0.42, size*0.2);
  cg.addColorStop(0, '#f5c518'); cg.addColorStop(1, '#f2994a');
  ctx.fillStyle = cg; ctx.fill();
  // "O" letter
  ctx.fillStyle = '#0a0a1a';
  ctx.font = 'bold ' + (size * 0.24) + 'px "Segoe UI", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('O', size/2, size*0.43);
  // "OLIGHFT" text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (size * 0.09) + 'px "Segoe UI", sans-serif';
  ctx.fillText('OLIGHFT', size/2, size*0.72);
  // "SMART COIN" subtext
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = (size * 0.05) + 'px "Segoe UI", sans-serif';
  ctx.fillText('SMART COIN', size/2, size*0.82);
  return c;
}

sizes.forEach(function(s) {
  var c = drawIcon(s);
  var div = document.createElement('div');
  div.style.textAlign = 'center';
  div.innerHTML = '<div style="margin-bottom:4px;font-size:12px;color:#a29bfe">' + s + 'x' + s + '</div>';
  var img = document.createElement('img');
  img.src = c.toDataURL('image/png');
  img.style.border = '1px solid rgba(255,255,255,.1)';
  img.style.borderRadius = '8px';
  img.id = 'icon-' + s;
  div.appendChild(img);
  document.getElementById('icons').appendChild(div);
});

function downloadAll() {
  sizes.forEach(function(s) {
    var c = drawIcon(s);
    var a = document.createElement('a');
    a.download = 'icon-' + s + '.png';
    a.href = c.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
